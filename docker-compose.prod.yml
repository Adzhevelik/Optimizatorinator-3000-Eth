version: "3.9"

services:
  backend:
    image: ${REGISTRY}/optimizatorinator-backend:${IMAGE_TAG}
    container_name: optimizatorinator-backend
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    image: ${REGISTRY}/optimizatorinator-frontend:${IMAGE_TAG}
    container_name: optimizatorinator-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: optimizatorinator-net
    